<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NetRisk Branch Previews</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 1rem;
      }
    </style>
    <script>
      (function () {
        const modules = [];
        const base = location.pathname.replace(/[^/]*$/, '');
        const s = document.createElement('script');
        s.src = base + 'env.js?' + Date.now();
        s.onload = () => {
          if (!window.__env || !window.__env.SUPABASE_URL || !window.__env.SUPABASE_ANON_KEY) {
            console.error('[ENV] Missing keys in env.js');
          }
          const loadModules = () => {
            modules.forEach((src) => {
              const m = document.createElement('script');
              m.type = 'module';
              m.src = src;
              document.body.appendChild(m);
            });
          };
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadModules);
          } else {
            loadModules();
          }
        };
        s.onerror = () => console.error('[ENV] env.js failed to load');
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <h1>NetRisk Branch Previews</h1>
    <ul id="branchList"></ul>
    <script>
      async function loadBranches() {
        const res = await fetch('https://api.github.com/repos/andreame-code/netrisk/branches');
        const data = await res.json();
        const list = document.getElementById('branchList');
        data
          .filter((b) => b.name !== 'gh-pages')
          .forEach((b) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = './' + b.name + '/';
            a.textContent = b.name;
            li.appendChild(a);
            list.appendChild(li);
          });
      }
      loadBranches();
    </script>
  </body>
</html>
