<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetRisk Game</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/theme.css" />
    <link rel="stylesheet" href="./css/game.css" />
  </head>
  <body class="game-page">
    <header id="gameHeader">
      <button id="exitGame" class="btn">Exit Game</button>
      <div id="turnStatus">Turn <span id="turnNumber">1</span> - <span id="currentPlayer"></span></div>
    </header>
    <div id="gameContainer">
      <div id="board" class="board"></div>
      <div id="uiPanel">
        <div id="howToPlayBox">
          <div>
            <strong>How to play (alpha)</strong>
            <button
              id="toggleHowToPlay"
              class="btn"
              aria-expanded="false"
              aria-controls="howToPlaySteps"
            >
              Show details
            </button>
          </div>
          <ol id="howToPlaySteps" hidden>
            <li>Click a territory</li>
            <li>Choose an action</li>
            <li>Press "End Turn"</li>
          </ol>
          <button id="replayTutorial" class="btn">Play Tutorial</button>
        </div>
        <div id="gameActions">
          <strong>Game Actions:</strong>
          <button
            id="moveToken"
            class="btn"
            aria-label="Move Token"
            accesskey="v"
          >
            Move Token
          </button>
          <button id="undo" class="btn" aria-label="Undo" accesskey="u" disabled>
            Undo
          </button>
          <button id="endTurn" class="btn" aria-label="End Turn" accesskey="e">
            End Turn
          </button>
        </div>
        <div id="status"></div>
        <div>Phase time: <span id="phaseTimer"></span></div>
        <div id="diceResults"></div>
        <div id="selectedTerritory"></div>
        <div><strong>Action log:</strong></div>
        <div id="actionLog" class="log"></div>
        <div id="otherControls">
          <strong>Other Controls:</strong>
          <div id="audioSettings">
            <label for="masterVolume">Master:</label>
            <input
              type="range"
              id="masterVolume"
              min="0"
              max="1"
              step="0.01"
              value="0.5"
            />
            <label for="effectsVolume">Effects:</label>
            <input
              type="range"
              id="effectsVolume"
              min="0"
              max="1"
              step="0.01"
              value="1"
            />
            <button
              id="muteBtn"
              class="btn"
              aria-label="Toggle mute"
              accesskey="m"
            >
              Mute
            </button>
            <button
              id="musicToggle"
              class="btn"
              aria-label="Toggle music"
              accesskey="i"
            >
              Music Off
            </button>
          </div>
          <button
            id="forceError"
            class="btn"
            aria-label="Force Error"
            accesskey="f"
          >
            Force Error
          </button>
          <button
            id="exportLog"
            class="btn"
            aria-label="Export Log"
            accesskey="x"
          >
            Export Log
          </button>
        </div>
      </div>
    </div>
      <script src="./env.js"></script>
    <script src="./src/logger.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
