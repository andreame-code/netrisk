name: Vercel Preview Smoke

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: vercel-preview-smoke-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: team_KZLHaqyM8HI03cxJQzg1e9Wz
      VERCEL_PROJECT_ID: prj_R61andzsXOZjOAfvj9GSOjS35aLv
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke test Vercel preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/vercel-preview-smoke.cjs
