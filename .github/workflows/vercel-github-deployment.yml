name: Vercel GitHub Deployment

on:
  status:

permissions:
  contents: read
  deployments: write
  statuses: read

concurrency:
  group: vercel-deployment-${{ github.event.sha || github.sha }}
  cancel-in-progress: false

jobs:
  register-vercel-deployment:
    if: ${{ github.event.context == 'Vercel' && github.event.state == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create GitHub deployment for Vercel preview
        uses: actions/github-script@v9
        env:
          VERCEL_ORG_ID: team_KZLHaqyM8HI03cxJQzg1e9Wz
          VERCEL_TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const status = context.payload;
            const statusUrl = String(status.target_url || "");
            const sha = String(status.sha || "");

            if (!sha) {
              core.setFailed("Vercel status payload did not include a commit SHA.");
              return;
            }

            if (!statusUrl.startsWith("https://vercel.com/")) {
              core.info(`Skipping non-Vercel status URL: ${statusUrl || "(missing)"}`);
              return;
            }

            const statusUrlObject = new URL(statusUrl);
            const statusPathParts = statusUrlObject.pathname.split("/").filter(Boolean);
            const deploymentKey = statusPathParts.pop();
            const vercelScopeSlug = statusPathParts[0] || "";

            if (!deploymentKey) {
              core.setFailed(`Unable to parse Vercel deployment id from ${statusUrl}.`);
              return;
            }

            if (!process.env.VERCEL_TOKEN) {
              core.setFailed("VERCEL_TOKEN is required to resolve the Vercel deployment URL.");
              return;
            }

            function uniqueDeploymentLookupUrls() {
              const deploymentKeys = deploymentKey.startsWith("dpl_")
                ? [deploymentKey]
                : [`dpl_${deploymentKey}`, deploymentKey];
              const baseUrls = deploymentKeys.map(
                (key) => `https://api.vercel.com/v13/deployments/${key}`
              );
              const urls = [];
              const seen = new Set();

              function add(baseUrl, query) {
                const url = query ? `${baseUrl}?${query}` : baseUrl;
                if (seen.has(url)) return;
                seen.add(url);
                urls.push(url);
              }

              for (const baseUrl of baseUrls) {
                if (process.env.VERCEL_ORG_ID) {
                  add(baseUrl, `teamId=${encodeURIComponent(process.env.VERCEL_ORG_ID)}`);
                }

                if (process.env.VERCEL_TEAM_SLUG) {
                  add(baseUrl, `slug=${encodeURIComponent(process.env.VERCEL_TEAM_SLUG)}`);
                }

                if (vercelScopeSlug) {
                  add(baseUrl, `slug=${encodeURIComponent(vercelScopeSlug)}`);
                }

                add(baseUrl, "");
              }
              return urls;
            }

            async function fetchVercelDeployment() {
              const failures = [];

              for (const lookupUrl of uniqueDeploymentLookupUrls()) {
                const response = await fetch(lookupUrl, {
                  headers: {
                    Authorization: `Bearer ${process.env.VERCEL_TOKEN}`,
                  },
                });

                if (response.ok) {
                  core.info(`Resolved Vercel deployment from ${lookupUrl}.`);
                  return await response.json();
                }

                const body = await response.text();
                failures.push(`${response.status} ${body}`);
                core.info(`Vercel deployment lookup failed at ${lookupUrl}: ${response.status}`);
              }

              core.setFailed(
                `Unable to fetch Vercel deployment ${deploymentKey}: ${failures.join(" | ")}`
              );
              return null;
            }

            const vercelDeployment = await fetchVercelDeployment();

            if (!vercelDeployment) {
              return;
            }

            const deploymentUrl = vercelDeployment.url ? `https://${vercelDeployment.url}` : "";

            if (!deploymentUrl) {
              core.setFailed(`Vercel deployment ${deploymentKey} did not include a URL.`);
              return;
            }

            const environment = vercelDeployment.target === "production" ? "Production" : "Preview";
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              sha,
              environment,
              per_page: 100,
            });

            for (const deployment of deployments) {
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner,
                repo,
                deployment_id: deployment.id,
                per_page: 1,
              });
              const latestStatus = statuses.data[0];

              if (
                latestStatus?.environment_url === deploymentUrl ||
                latestStatus?.log_url === statusUrl ||
                latestStatus?.target_url === statusUrl
              ) {
                core.info(`GitHub deployment already exists: ${deployment.id}`);
                return;
              }
            }

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: sha,
              task: "deploy",
              auto_merge: false,
              required_contexts: [],
              environment,
              description: "Vercel deployment",
              transient_environment: environment !== "Production",
              production_environment: environment === "Production",
            });

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: "success",
              environment_url: deploymentUrl,
              log_url: statusUrl,
              description: "Vercel deployment ready",
              auto_inactive: false,
            });

            core.info(`Created GitHub deployment ${deployment.data.id}: ${deploymentUrl}`);
