name: Supabase Functions Deploy
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: ['main']
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-deploy.yml'

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets presence
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          [ -n "$SUPABASE_PROJECT_REF" ] || { echo "❌ Missing secret SUPABASE_PROJECT_REF"; exit 1; }
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || { echo "❌ Missing secret SUPABASE_ACCESS_TOKEN"; exit 1; }
          echo "✅ Secrets present (environment: github-pages)"

      - name: Supabase login
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase login --token "$SUPABASE_ACCESS_TOKEN"

      # ⬇️ NIENTE supabase link qui

      - name: Deploy function "netrisk"
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase functions deploy netrisk --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"

      - name: Print Function URL
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: echo "wss://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/netrisk"
