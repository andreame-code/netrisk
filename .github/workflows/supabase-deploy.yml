name: Supabase Functions Deploy

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installa Deno (alcune versioni della CLI lo usano per il bundle)
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      # Installa la Supabase CLI e la aggiunge al PATH
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check supabase version
        run: supabase --version

      - name: Link project and deploy function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --access-token "$SUPABASE_ACCESS_TOKEN"
          supabase functions deploy netrisk --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"

      - name: Print Function URL
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "wss://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/netrisk"
