name: UAT
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  uat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:uat
