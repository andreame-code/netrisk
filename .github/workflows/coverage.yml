name: Coverage

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npm run coverage

      - name: Publish coverage summary
        run: |
          node -e "const fs=require('node:fs'); const summary=require('./coverage/coverage-summary.json').total; const pct=(k)=>Number(summary[k].pct).toFixed(2); const body=['## Coverage','',`- Statements: ${pct('statements')}%`,`- Branches: ${pct('branches')}%`,`- Functions: ${pct('functions')}%`,`- Lines: ${pct('lines')}%`,''].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, body);"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
