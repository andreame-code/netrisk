name: Quality

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository typecheck
        run: npm run typecheck

      - name: Run React shell typecheck
        run: npm run typecheck:react-shell

      - name: Run build
        run: npm run build:ts

      - name: Install Vercel CLI
        run: npm install --global vercel@50.39.0

      - name: Verify Vercel auth for env parity
        id: vercel_auth
        continue-on-error: ${{ github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.login == 'dependabot[bot]') }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_KZLHaqyM8HI03cxJQzg1e9Wz
          VERCEL_PROJECT_ID: prj_R61andzsXOZjOAfvj9GSOjS35aLv
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN is not configured."
            exit 1
          fi
          vercel whoami --token "$VERCEL_TOKEN"

      - name: Note skipped Vercel env parity check
        if: ${{ github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.login == 'dependabot[bot]') && steps.vercel_auth.outcome != 'success' }}
        run: |
          echo "Skipping Vercel env parity check because forked and Dependabot pull requests do not get VERCEL_TOKEN." >> "$GITHUB_STEP_SUMMARY"

      - name: Run Vercel env parity check
        if: ${{ steps.vercel_auth.outcome == 'success' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_KZLHaqyM8HI03cxJQzg1e9Wz
          VERCEL_PROJECT_ID: prj_R61andzsXOZjOAfvj9GSOjS35aLv
          VERCEL_ENV_CHECK_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: npm run vercel:env:check

      - name: Run lint
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Run React shell tests
        run: npm run test:react
