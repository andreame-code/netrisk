name: Quality

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository typecheck
        run: npm run typecheck

      - name: Run React shell typecheck
        run: npm run typecheck:react-shell

      - name: Run build
        run: npm run build:ts

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Prepare Vercel project link
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npm run vercel:link:ci

      - name: Run Vercel env parity check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ENV_CHECK_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: npm run vercel:env:check

      - name: Run lint
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Run React shell tests
        run: npm run test:react
