name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Guard: no legacy env and src scripts"
        shell: bash
        run: |
          set -e
          grep -RIn '<script[^>]*src="env.js"' . && { echo '❌ env.js reference'; exit 1; } || true
          grep -RIn '<script[^>]*src="src/' . && { echo '❌ direct src/ script reference'; exit 1; } || true
          echo '✅ Guard passed'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate env file
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          [ -n "$SUPABASE_URL" ] || { echo '❌ Missing SUPABASE_URL'; exit 1; }
          [ -n "$SUPABASE_ANON_KEY" ] || { echo '❌ Missing SUPABASE_ANON_KEY'; exit 1; }
          rm -f public/env.*.js
          STAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > public/env.$SHA.js <<EOF
          window.__env = {
            SUPABASE_URL: "$SUPABASE_URL",
            SUPABASE_ANON_KEY: "$SUPABASE_ANON_KEY",
            STAMP: "$STAMP",
            SHA: "$SHA"
          };
          console.log('[ENV]', { STAMP: "$STAMP", SHA: "$SHA" });
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js?v=$SHA').catch(e => console.error('SW registration failed', e));
          }
          EOF
          echo "VITE_SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> $GITHUB_ENV
          echo "VITE_COMMIT_SHA=$SHA" >> $GITHUB_ENV
          find . -maxdepth 1 -name '*.html' -exec sed -i "s/%VITE_COMMIT_SHA%/$SHA/g" {} +
          find public -name '*.html' -exec sed -i "s/%VITE_COMMIT_SHA%/$SHA/g" {} +
          sed -i "s/%VITE_COMMIT_SHA%/$SHA/g" public/sw.js

      - name: Build (Vite, production mode)
        run: npm run build -- --mode production

      - name: Stage static files
        run: |
          if [ -d dist ]; then true; elif [ -d build ]; then mv build dist; elif [ -d out ]; then mv out dist; else mkdir -p dist; fi
          cp -r supabase dist/

      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
