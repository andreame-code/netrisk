name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify secrets presence
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          [ -n "$SUPABASE_URL" ] || { echo "❌ Missing SUPABASE_URL"; exit 1; }
          [ -n "$SUPABASE_ANON_KEY" ] || { echo "❌ Missing SUPABASE_ANON_KEY"; exit 1; }
          echo "✅ Secrets present (pages build)"

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Normalize artifact to dist/
        run: |
          if [ -d dist ]; then exit 0; fi
          if [ -d build ]; then mv build dist; exit 0; fi
          if [ -d out ]; then mv out dist; exit 0; fi
          mkdir -p dist

      - name: Create runtime env.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p dist
          node - <<'NODE'
          const fs = require('fs');
          const url = process.env.SUPABASE_URL;
          const anon = process.env.SUPABASE_ANON_KEY;
          let ws = '';
          try {
            const u = new URL(url);
            ws = 'wss://' + u.host + '/functions/v1/netrisk';
          } catch(e) {}
          fs.writeFileSync('dist/env.js', `window.__ENV = {\n  SUPABASE_URL: '${url}',\n  SUPABASE_ANON_KEY: '${anon}',\n  WS_URL: '${ws}'\n};`);
          NODE

      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
