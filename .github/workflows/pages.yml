name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Guard: no env.js refs"
        run: |
            if grep -RIn --exclude-dir=.git --exclude-dir=.github -E "<script src['\"]env.js" .; then
              echo '❌ Found <script src="env.js"> in HTML'
              exit 1
            fi
            if grep -RIn --exclude-dir=.git --exclude-dir=.github -E "window.__ENV" .; then
              echo '❌ Found window.__ENV in repository'
              exit 1
            fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify env vars presence
        run: |
          [ -n "$VITE_SUPABASE_URL" ] || { echo "❌ Missing VITE_SUPABASE_URL"; exit 1; }
          [ -n "$VITE_SUPABASE_ANON_KEY" ] || { echo "❌ Missing VITE_SUPABASE_ANON_KEY"; exit 1; }
          echo "✅ VITE env vars present"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stage static files
        run: |
          if [ -d dist ]; then true; elif [ -d build ]; then mv build dist; elif [ -d out ]; then mv out dist; else mkdir -p dist; fi
          cp -r map*.svg map-manifest.json supabase dist/
      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
