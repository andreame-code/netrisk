name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Guard-rails: verifica secrets presenti'
        run: |
          test -n "${{ secrets.SUPABASE_URL }}" || (echo "Missing SUPABASE_URL" && exit 1)
          test -n "${{ secrets.SUPABASE_ANON_KEY }}" || (echo "Missing SUPABASE_ANON_KEY" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Replace commit SHA in service worker
        run: sed -i "s/%VITE_COMMIT_SHA%/${GITHUB_SHA}/g" public/sw.js

      - name: Build (Vite, production mode)
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build -- --mode production

      - name: Stage static files
        run: |
          mkdir -p dist
          cp -r supabase dist/

      - name: Generate env.${{ github.sha }}.js
        working-directory: dist
        run: |
          cat > env.${{ github.sha }}.js <<'EOENV'
          // Auto-generated at build time. Do NOT commit real keys.
          window.__env = {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}",
            SHA: "${{ github.sha }}"
          };
          console.log('[ENV CHECK] loaded: OK');
          EOENV
          cat > env.js <<'EOENV'
          window.__env = {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}",
            SHA: "${{ github.sha }}"
          };
          EOENV

      - name: Patch index.html with env script
        working-directory: dist
        run: |
          sed -i "s#</head>#  <script src=\"env.${GITHUB_SHA}.js\"></script>\n</head>#" index.html

      - name: Verify env file
        run: |
          test -f dist/env.${GITHUB_SHA}.js
          grep -q "window.__env" dist/env.${GITHUB_SHA}.js
          grep -Eq "SUPABASE_URL: \"[^\"]+\"" dist/env.${GITHUB_SHA}.js
          grep -Eq "SUPABASE_ANON_KEY: \"[^\"]+\"" dist/env.${GITHUB_SHA}.js

      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
