name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Guard: no legacy env and src scripts"
        shell: bash
        run: |
          set -e
          grep -RIn '<script[^>]*src="env.js"' . && { echo '❌ env.js reference'; exit 1; } || true
          grep -RIn '<script[^>]*src="src/' . && { echo '❌ direct src/ script reference'; exit 1; } || true
          echo '✅ Guard passed'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify env vars presence
        run: |
          [ -n "$VITE_SUPABASE_URL" ] || { echo "❌ Missing VITE_SUPABASE_URL"; exit 1; }
          [ -n "$VITE_SUPABASE_ANON_KEY" ] || { echo "❌ Missing VITE_SUPABASE_ANON_KEY"; exit 1; }
          [ -n "$SUPABASE_URL" ] || { echo "❌ Missing SUPABASE_URL"; exit 1; }
          [ -n "$SUPABASE_ANON_KEY" ] || { echo "❌ Missing SUPABASE_ANON_KEY"; exit 1; }
          echo "✅ Env vars present"

      - name: Install deps
        run: npm ci

      - name: Write .env.production for Vite
        run: |
          cat > .env.production <<EOF
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: Build (Vite, production mode)
        run: npm run build -- --mode production

      - name: Stage static files
        run: |
          if [ -d dist ]; then true; elif [ -d build ]; then mv build dist; elif [ -d out ]; then mv out dist; else mkdir -p dist; fi
          cp -r supabase dist/
      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
