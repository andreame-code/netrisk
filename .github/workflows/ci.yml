name: PR Checks
permissions:
  contents: write

on:
  pull_request:
    branches: [ main ]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  e2e-smoke:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e:smoke

  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - '**/*.html'
              - 'css/**'
              - 'public/**'
              - 'src/components/**'

  preview:
    needs: [unit, e2e-smoke, changes]
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'dummy-key' }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'dummy-key' }}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -- --mode production
      - run: |
          cp -r supabase dist/
          cp public/404.html dist/404.html
      - name: Ensure gh-pages branch exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if ! git ls-remote --exit-code origin gh-pages; then
            echo "Creating empty gh-pages branch"
            tmpdir=$(mktemp -d)
            git init "$tmpdir"
            cd "$tmpdir"
            git checkout -b gh-pages
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "ci: initial gh-pages"
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin gh-pages
            cd -
          fi
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - name: Update preview
        run: |
          mkdir -p gh-pages/${BRANCH_NAME}
          rsync -a --delete dist/ gh-pages/${BRANCH_NAME}/
          cp preview-index.html gh-pages/index.html
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "ci: deploy preview for ${BRANCH_NAME}" || echo "No changes"
          git push origin gh-pages
