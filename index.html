<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button
      id="themeToggle"
      class="btn"
      aria-label="Toggle high contrast mode"
      accesskey="h"
    >
      High Contrast
    </button>
    <h1>NetRisk</h1>
    <div id="mainMenu">
      <button
        id="setupBtn"
        class="btn"
        aria-label="Set up players"
        accesskey="p"
      >
        Set up players
      </button>
      <button id="aboutBtn" class="btn" aria-label="About/Help" accesskey="a">
        About/Help
      </button>
    </div>
    <script type="module">
      import { initThemeToggle } from "./theme.js";
      import { navigateTo } from "./navigation.js";

      initThemeToggle();

      const setupBtn = document.getElementById("setupBtn");
      if (setupBtn) {
        setupBtn.addEventListener("click", () => navigateTo("setup.html"));
      }

      const aboutBtn = document.getElementById("aboutBtn");
      if (aboutBtn) {
        const lang =
          navigator.language && navigator.language.startsWith("it")
            ? "it"
            : "en";
        aboutBtn.textContent = lang === "it" ? "Info/Aiuto" : "About/Help";
        aboutBtn.addEventListener("click", () => navigateTo("about.html"));
      }
    </script>
  </body>
</html>
