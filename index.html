<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NetRisk</title>
    <link rel="stylesheet" href="./style.css?v=2" />
  </head>
  <body>
    <h1>NetRisk</h1>
    <div id="uiPanel">
      <div>Turno corrente: <span id="turnNumber">1</span></div>
      <div>Giocatore corrente: <span id="currentPlayer"></span></div>
      <div id="quickInstructions">
        Istruzioni rapide: clicca un territorio per agire, poi premi "End Turn".
      </div>
      <div><strong>Log azioni:</strong></div>
      <div id="actionLog" class="log"></div>
    </div>
    <div id="status"></div>
    <div id="diceResults"></div>
    <div id="selectedTerritory"></div>
    <div id="board" class="board"></div>
    <button id="endTurn">End Turn</button>
    <button id="forceError">Force Error</button>
    <script src="./logger.js?v=2"></script>
    <script src="./game.js?v=2"></script>
    <script src="./script.js?v=2"></script>
    <script src="./territory-selection.js?v=1"></script>
  </body>
</html>
