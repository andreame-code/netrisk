<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="home-page">
    <header class="home-header">
      <button
        id="themeToggle"
        class="btn"
        aria-label="Toggle high contrast mode"
        accesskey="c"
      >
        High Contrast
      </button>
    </header>
    <main id="mainMenu">
      <h1>NetRisk</h1>
      <button id="playBtn" class="btn" aria-label="Play game" accesskey="p">
        Play
      </button>
      <button id="setupBtn" class="btn" aria-label="Player setup" accesskey="s">
        Setup
      </button>
      <button
        id="howToPlayBtn"
        class="btn"
        aria-label="How to play"
        accesskey="h"
      >
        How to Play
      </button>
      <button id="aboutBtn" class="btn" aria-label="About and settings" accesskey="a">
        About/Settings
      </button>
    </main>
    <script type="module" src="./home.js"></script>
  </body>
</html>
