<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/theme.css" />
    <script type="importmap" src="./importmap.json"></script>
  </head>
  <body class="home-page">
    <header class="main-header">
      <a href="./index.html" class="logo">NetRisk</a>
      <nav>
        <a href="./index.html">Home</a>
        <a href="./setup.html">Setup</a>
        <a href="./how-to-play.html">How To</a>
        <a href="./about.html">About</a>
        <span id="userMenu" class="user-menu loading"></span>
      </nav>
      <button
        id="themeToggle"
        class="btn"
        aria-label="Toggle high contrast mode"
        accesskey="c"
      >
        High Contrast
      </button>
    </header>
    <main id="mainMenu">
      <h1>NetRisk</h1>
      <button id="playBtn" class="btn" aria-label="Play game" accesskey="p">
        Play
      </button>
      <button
        id="multiplayerBtn"
        class="btn"
        aria-label="Multiplayer game"
        accesskey="m"
      >
        Multiplayer
      </button>
      <button id="setupBtn" class="btn" aria-label="Player setup" accesskey="s">
        Setup
      </button>
      <button
        id="howToPlayBtn"
        class="btn"
        aria-label="How to play"
        accesskey="h"
      >
        How to Play
      </button>
      <button id="aboutBtn" class="btn" aria-label="About and settings" accesskey="a">
        About/Settings
      </button>
    </main>
    <script src="./env.js?sha=%VITE_COMMIT_SHA%" onerror="document.write('<script src=&quot;./env.js&quot;><\/script>')"></script>
    <script type="module" src="./auth.js"></script>
    <script type="module" src="./home.js"></script>
  </body>
</html>
