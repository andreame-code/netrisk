<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button id="themeToggle">High Contrast</button>
    <h1>NetRisk</h1>
    <div id="mainMenu">
      <button id="startGame">Start Game</button>
      <div><a href="setup.html">Set up players</a></div>
    </div>
    <div id="gameContainer" style="display: none">
      <div id="uiPanel">
        <div>Current turn: <span id="turnNumber">1</span></div>
        <div>Current player: <span id="currentPlayer"></span></div>
        <div id="howToPlayBox">
          <div>
            <strong>How to play (alpha)</strong>
            <button
              id="toggleHowToPlay"
              aria-expanded="false"
              aria-controls="howToPlaySteps"
            >
              Show details
            </button>
          </div>
          <ol id="howToPlaySteps" hidden>
            <li>Click a territory</li>
            <li>Choose an action</li>
            <li>Press "End Turn"</li>
          </ol>
        </div>
        <div><strong>Action log:</strong></div>
        <div id="actionLog" class="log"></div>
        <div id="status"></div>
        <div id="diceResults"></div>
        <div id="selectedTerritory"></div>
        <div id="audioSettings">
          <label for="volumeControl">Volume:</label>
          <input
            type="range"
            id="volumeControl"
            min="0"
            max="1"
            step="0.01"
            value="0.2"
          />
          <button id="muteBtn">Mute</button>
        </div>
        <button id="moveToken">Move Token</button>
        <button id="endTurn">End Turn</button>
        <button id="forceError">Force Error</button>
      </div>
      <div id="board" class="board"></div>
    </div>
    <script src="./logger.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
