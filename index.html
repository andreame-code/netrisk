<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetRisk</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <button
        id="themeToggle"
        class="btn"
        aria-label="Toggle high contrast mode"
        accesskey="t"
      >
        High Contrast
      </button>
    </header>
    <main id="homeMenu">
      <h1>NetRisk</h1>
      <nav>
        <a
          id="playBtn"
          href="game.html"
          class="btn"
          aria-label="Play"
          accesskey="p"
        >
          Play
        </a>
        <a
          id="setupBtn"
          href="setup.html"
          class="btn"
          aria-label="Setup players"
          accesskey="s"
        >
          Setup
        </a>
        <a
          id="howToPlayBtn"
          href="how-to-play.html"
          class="btn"
          aria-label="How to Play"
          accesskey="h"
        >
          How to Play
        </a>
        <a
          id="aboutBtn"
          href="about.html"
          class="btn"
          aria-label="About and settings"
          accesskey="a"
        >
          About / Settings
        </a>
      </nav>
    </main>
    <script type="module" src="./theme.js"></script>
  </body>
</html>
