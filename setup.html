<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Setup NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
  </head>
  <body>
    <header>
      <h1>Player Setup</h1>
      <button id="themeToggle">High Contrast</button>
    </header>
    <main>
      <form id="setupForm">
        <fieldset>
          <legend>Players</legend>
          <label>
            Number of human players:
            <input type="number" id="humanCount" min="1" max="6" required value="1" />
          </label>
          <label>
            Number of AI players:
            <input type="number" id="aiCount" min="0" max="5" required value="2" />
          </label>
        </fieldset>
        <fieldset>
          <legend>Map</legend>
          <label>
            Map:
            <select id="mapSelect">
              <option value="map">Classic</option>
              <option value="map2">Desert</option>
            </select>
          </label>
        </fieldset>
        <div id="players"></div>
        <button type="submit">Start</button>
      </form>
    </main>
    <script type="module" src="./setup.js"></script>
  </body>
</html>
