<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Setup NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
  </head>
  <body>
    <button id="themeToggle" class="btn">High Contrast</button>
    <button id="homeBtn" class="btn">Back to Home</button>
    <h1>Player Setup</h1>
    <form id="setupForm">
      <label>
        Number of human players:
        <input type="number" id="humanCount" min="1" max="6" required value="1" />
      </label>
      <label>
        Number of AI players:
        <input type="number" id="aiCount" min="0" max="5" required value="2" />
      </label>
      <label>
        AI Difficulty:
        <select id="aiDifficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </label>
      <label>
        AI Style:
        <select id="aiStyle">
          <option value="aggressive">Aggressive</option>
          <option value="balanced" selected>Balanced</option>
          <option value="defensive">Defensive</option>
        </select>
      </label>
      <p>Map:</p>
      <input type="hidden" id="mapSelect" />
      <div id="mapGrid"></div>
      <div id="players"></div>
      <button type="submit" class="btn">Start</button>
    </form>
    <script type="module" src="./setup.js"></script>
  </body>
</html>
