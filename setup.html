<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/theme.css" />
    <link rel="stylesheet" href="./css/game.css" />
    <title>Setup NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (function () {
        var v = Date.now();
        document.write('<script src="build.js?v=' + v + '"><\/script>');
        document.write('<script src="env.js?v=' + v + '" onerror="console.error(\\'[ENV] env.js failed to load\\')"><\/script>');
      })();
    </script>
    <script>
      (function () {
        if (!window.__env || !window.__env.SUPABASE_URL || !window.__env.SUPABASE_ANON_KEY) {
          console.error('[ENV] Missing keys in env.js');
        }
      })();
    </script>
  </head>
  <body>
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading" data-testid="user-status"></span>
      </nav>
    </header>
    <h1>Player Setup</h1>
    <form id="setupForm">
      <label>
        Number of human players:
        <input type="number" id="humanCount" min="1" max="6" required value="1" />
      </label>
      <label>
        Number of AI players:
        <input type="number" id="aiCount" min="0" max="5" required value="2" />
      </label>
      <label>
        AI Difficulty:
        <select id="aiDifficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </label>
      <label>
        AI Style:
        <select id="aiStyle">
          <option value="aggressive">Aggressive</option>
          <option value="balanced" selected>Balanced</option>
          <option value="defensive">Defensive</option>
        </select>
      </label>
      <p>Map:</p>
      <input type="hidden" id="mapSelect" />
      <div id="mapGrid"></div>
      <div id="players"></div>
      <button type="submit" class="btn">Start</button>
    </form>
    <script type="module" src="./auth.js"></script>
    <script type="module" src="./setup.js"></script>
  </body>
</html>
