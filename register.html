<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - NetRisk</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/theme.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
      const modules = ['./auth.js', './register.js'];
      const loadModules = () => {
        modules.forEach((src) => {
          const m = document.createElement('script');
          m.type = 'module';
          m.src = src;
          document.head.appendChild(m);
        });
      };
      const base = location.pathname.replace(/[^/]*$/, '');
      try {
        await import(`${base}env.js?${Date.now()}`);
        if (!window.__env?.SUPABASE_URL || !window.__env?.SUPABASE_ANON_KEY) {
          console.error('[ENV] Missing keys in env.js');
        }
      } catch {
        console.error('[ENV] env.js failed to load');
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadModules);
      } else {
        loadModules();
      }
    </script>
  </head>
  <body>
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading" data-testid="user-status"></span>
      </nav>
    </header>
    <main>
      <h1>Register</h1>
      <form id="registerForm">
        <label>
          Email:
          <input type="email" id="username" required />
        </label>
        <label>
          Password:
          <input type="password" id="password" required />
        </label>
        <button type="submit" class="btn">Create Account</button>
      </form>
      <p id="message" role="alert" data-testid="error-msg"></p>
    </main>
  </body>
</html>
