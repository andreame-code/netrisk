<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="modulepreload" crossorigin href="./assets/preload-helper-BgjqD-g9.js">
    <link rel="stylesheet" crossorigin href="./assets/preload-helper-BaM4L7Wl.css">
  </head>
  <body>
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading" data-testid="user-status"></span>
      </nav>
    </header>
    <main>
      <h1>Register</h1>
      <form id="registerForm">
        <label>
          Email:
          <input type="email" id="username" required />
        </label>
        <label>
          Password:
          <input type="password" id="password" required />
        </label>
        <button type="submit" class="btn">Create Account</button>
      </form>
      <p id="message" role="alert" data-testid="error-msg"></p>
    </main>
  </body>
