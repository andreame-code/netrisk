<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - NetRisk</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" crossorigin src="./assets/login-DFU0jul2.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/config-VUvQXQsa.js">
    <link rel="modulepreload" crossorigin href="./assets/auth-4aqIjQgo.js">
    <link rel="modulepreload" crossorigin href="./assets/auth-forms-D7GGHNDW.js">
    <link rel="modulepreload" crossorigin href="./assets/referrer-C4oI9rxO.js">
    <link rel="stylesheet" crossorigin href="./assets/config-BaM4L7Wl.css">
  </head>
  <body>
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading"></span>
      </nav>
    </header>
    <main>
      <h1>Login</h1>
      <form id="loginForm">
        <label>
          Email:
          <input type="text" id="username" required data-testid="login-email" />
        </label>
        <label>
          Password:
          <input type="password" id="password" required data-testid="login-password" />
        </label>
        <label> <input type="checkbox" id="stayLoggedIn" /> Resta connesso </label>
        <p class="help-text">
          Se selezionato, l'accesso rimarrà attivo anche dopo la chiusura del browser.
        </p>
        <button type="submit" class="btn" data-testid="login-submit">Login</button>
        <a id="registerBtn" class="btn" href="./register.html">Register</a>
        <button type="button" id="anonymousBtn" class="btn" data-testid="login-anon">
          Login anonymously
        </button>
        <a href="./forgot.html">Password dimenticata?</a>
      </form>
      <p id="message" role="alert" data-testid="error-msg"></p>
    </main>
    <script src="./env.js"></script>
  </body>
</html>
