<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - NetRisk</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (function () {
        var v = Date.now();
        document.write('<script src="build.js?v=' + v + '"><\/script>');
        document.write('<script src="env.js?v=' + v + '" onerror="console.error(\\'[ENV] env.js failed to load\\')"><\/script>');
      })();
    </script>
    <script>
      (function () {
        if (!window.__env || !window.__env.SUPABASE_URL || !window.__env.SUPABASE_ANON_KEY) {
          console.error('[ENV] Missing keys in env.js');
        }
      })();
    </script>
    <script type="module" crossorigin src="./assets/forgot-DIMS12v6.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/config-pcTzC3rW.js">
    <link rel="modulepreload" crossorigin href="./assets/auth-BipyuBRu.js">
    <link rel="modulepreload" crossorigin href="./assets/auth-forms-x3uosdLV.js">
    <link rel="stylesheet" crossorigin href="./assets/config-BaM4L7Wl.css">
  </head>
  <body>
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading" data-testid="user-status"></span>
      </nav>
    </header>
    <main>
      <h1>Recupera password</h1>
      <form id="forgotForm">
        <label>
          Email:
          <input type="email" id="email" required />
        </label>
        <button type="submit" class="btn">Invia</button>
      </form>
      <p id="message" role="alert" data-testid="error-msg"></p>
    </main>
  </body>
</html>
