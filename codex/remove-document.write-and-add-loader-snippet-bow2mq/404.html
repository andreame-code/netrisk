<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta id="redirect-meta" http-equiv="refresh" />
    <script>
      (async () => {
        const { pathname, search, hash } = window.location;
        const segments = pathname.replace(/\/$/, '').split('/');
        for (let i = segments.length; i > 0; i--) {
          const base = segments.slice(0, i).join('/') || '/';
          try {
            const res = await fetch(`${base}/index.html`, { method: 'HEAD' });
            if (res.ok) {
              const target = `${base}/index.html${search}${hash}`;
              document.getElementById('redirect-meta').setAttribute('content', `0; url=${target}`);
              window.location.replace(target);
              return;
            }
          } catch {
            // ignore fetch errors and try the next candidate
          }
        }
        const fallback = `/netrisk/index.html${search}${hash}`;
        document.getElementById('redirect-meta').setAttribute('content', `0; url=${fallback}`);
        window.location.replace(fallback);
      })();
    </script>
    <script>
      (function () {
        const base = location.pathname.replace(/[^/]*$/, '');
        try {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', base + 'env.js?' + Date.now(), false);
          xhr.send(null);
          if (xhr.status >= 200 && xhr.status < 300) {
            (0, eval)(xhr.responseText);
            if (!window.__env || !window.__env.SUPABASE_URL || !window.__env.SUPABASE_ANON_KEY) {
              console.error('[ENV] Missing keys in env.js');
            }
          } else {
            console.error('[ENV] env.js failed to load');
          }
        } catch (e) {
          console.error('[ENV] env.js failed to load');
        }
      })();
    </script>
  </head>
  <body></body>
</html>
