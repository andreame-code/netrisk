<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" crossorigin src="./assets/about-eAmoxdVH.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/preload-helper-BgjqD-g9.js">
    <link rel="stylesheet" crossorigin href="./assets/preload-helper-BaM4L7Wl.css">
  </head>
  <body>
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading" data-testid="user-status"></span>
      </nav>
    </header>
    <h1 id="pageTitle">About &amp; Settings</h1>
    <div id="helpContent">
      <section id="credits">
        <h2>Credits</h2>
        <div class="content"></div>
      </section>
      <section id="changelog">
        <h2>Changelog</h2>
        <div class="content"></div>
      </section>
      <section id="github">
        <h2>GitHub</h2>
        <div class="content"></div>
      </section>
      <section id="settings">
        <h2>Settings</h2>
        <div class="content">
          <label for="themeSelect">Theme:</label>
          <select id="themeSelect" aria-label="Theme selection">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <button id="themeToggle" class="btn" aria-label="Toggle high contrast mode">
            High Contrast
          </button>
          <label for="masterVolume">Volume:</label>
          <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.5" />
          <button id="muteBtn" class="btn" aria-label="Toggle mute">Mute</button>
        </div>
      </section>
    </div>
  </body>
