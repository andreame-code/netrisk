<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - NetRisk</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (function () {
        var b = document.createElement('script');
        b.src = 'build.js?v=' + Date.now();
        b.defer = false;
        document.head.appendChild(b);

        var s = document.createElement('script');
        s.src = 'env.js?v=' + Date.now();
        s.defer = false;
        s.onload = function () {
          if (!window.__env || !window.__env.SUPABASE_URL || !window.__env.SUPABASE_ANON_KEY) {
            console.error('[ENV] Missing keys in env.js');
          }
        };
        s.onerror = function () {
          console.error('[ENV] env.js failed to load');
        };
        document.head.appendChild(s);
      })();
    </script>
    <script type="module" crossorigin src="./assets/register-B0ZKo3cV.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/config-pcTzC3rW.js">
    <link rel="modulepreload" crossorigin href="./assets/auth-BipyuBRu.js">
    <link rel="modulepreload" crossorigin href="./assets/auth-forms-x3uosdLV.js">
    <link rel="modulepreload" crossorigin href="./assets/referrer-C4oI9rxO.js">
    <link rel="stylesheet" crossorigin href="./assets/config-BaM4L7Wl.css">
  </head>
  <body>
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading" data-testid="user-status"></span>
      </nav>
    </header>
    <main>
      <h1>Register</h1>
      <form id="registerForm">
        <label>
          Email:
          <input type="email" id="username" required />
        </label>
        <label>
          Password:
          <input type="password" id="password" required />
        </label>
        <button type="submit" class="btn">Create Account</button>
      </form>
      <p id="message" role="alert" data-testid="error-msg"></p>
    </main>
  </body>
</html>
