<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - NetRisk</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/theme.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (function () {
        const base = location.pathname.replace(/[^/]*$/, '');
        try {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', base + 'env.js?' + Date.now(), false);
          xhr.send(null);
          if (xhr.status >= 200 && xhr.status < 300) {
            (0, eval)(xhr.responseText);
            if (!window.__env || !window.__env.SUPABASE_URL || !window.__env.SUPABASE_ANON_KEY) {
              console.error('[ENV] Missing keys in env.js');
            }
          } else {
            console.error('[ENV] env.js failed to load');
          }
        } catch (e) {
          console.error('[ENV] env.js failed to load');
        }
      })();
    </script>
  </head>
  <body>
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading" data-testid="user-status"></span>
      </nav>
    </header>
    <main>
      <h1>Recupera password</h1>
      <form id="forgotForm">
        <label>
          Email:
          <input type="email" id="email" required />
        </label>
        <button type="submit" class="btn">Invia</button>
      </form>
      <p id="message" role="alert" data-testid="error-msg"></p>
    </main>
    <script type="module" src="./auth.js"></script>
    <script type="module" src="./forgot.js"></script>
  </body>
</html>
