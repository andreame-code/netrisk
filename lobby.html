<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/theme.css" />
    <title>Lobby - NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="lobby-page">
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
        <span id="userMenu" class="user-menu loading"></span>
      </nav>
    </header>
    <main>
      <h1>Lobby</h1>
      <div id="lobbyError" class="hidden" data-testid="error-msg">
        <p id="lobbyErrorMsg"></p>
        <button id="retryLobby" class="btn">Retry</button>
      </div>
      <button id="backBtn" class="btn" aria-label="Back to home" accesskey="b">Back</button>
      <button
        id="createBtn"
        class="btn"
        aria-label="Create new game"
        accesskey="n"
        data-testid="lobby-create"
      >
        Create game
      </button>
      <ul id="lobbyList" class="lobby-list" data-testid="lobby-list"></ul>
      <dialog id="createDialog">
        <form id="createForm">
          <label>Room name <input id="roomName" required /></label>
          <label
            >Max players <input id="maxPlayers" type="number" min="2" max="8" value="2" required
          /></label>
          <label
            >Map
            <select id="map"></select
          ></label>
          <menu>
            <button type="button" value="cancel" id="cancelCreate">Cancel</button>
            <button type="submit" id="submitCreate" value="default">Create</button>
          </menu>
        </form>
      </dialog>
      <section class="chat">
        <ul id="chatMessages" class="chat-messages"></ul>
        <form id="chatForm" class="chat-form" autocomplete="off">
          <input id="chatInput" maxlength="200" aria-label="Chat message" />
          <button type="submit">Send</button>
        </form>
      </section>
      <section id="debugLog" class="debug-log" aria-live="polite"></section>
    </main>
    <script src="./env.js"></script>
    <script type="module" src="./auth.js"></script>
    <script type="module" src="./lobby.js"></script>
  </body>
</html>
