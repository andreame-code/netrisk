<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/theme.css" />
    <title>Lobby - NetRisk</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-transform" />
  </head>
  <body class="lobby-page">
    <header class="main-header">
      <a href="index.html" class="logo">NetRisk</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="setup.html">Setup</a>
        <a href="how-to-play.html">How To</a>
        <a href="about.html">About</a>
      </nav>
    </header>
    <main>
      <h1>Lobby</h1>
      <button id="backBtn" class="btn" aria-label="Back to home" accesskey="b">Back</button>
      <button id="createBtn" class="btn" aria-label="Create new game" accesskey="n">Create game</button>
      <ul id="lobbyList" class="lobby-list"></ul>
      <dialog id="createDialog">
        <form method="dialog" id="createForm">
          <label>Room name <input id="roomName" required /></label>
          <label>Max players <input id="maxPlayers" type="number" min="2" max="6" value="2" required /></label>
          <label>Map <select id="map"></select></label>
          <menu>
            <button type="button" value="cancel" id="cancelCreate">Cancel</button>
            <button type="submit" id="submitCreate" value="default">Create</button>
          </menu>
        </form>
      </dialog>
      <section class="chat">
        <ul id="chatMessages" class="chat-messages"></ul>
        <form id="chatForm" class="chat-form" autocomplete="off">
          <input id="chatInput" maxlength="200" aria-label="Chat message" />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="env.js"></script>
    <script type="module" src="./src/lobby.js"></script>
  </body>
</html>
